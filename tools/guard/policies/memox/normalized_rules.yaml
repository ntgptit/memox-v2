    scope: widget_ui_files
    fix_hint_code: avoid_screen_percentage_in_regular_widgets
    params:
      check_id: ui_media_query_screen_percentage
      percentage_pattern: "MediaQuery(?:\\.of\\([^)]*\\)\\.size|\\.sizeOf\\([^)]*\\))\\.(?:width|height)\\s*\\*"
      allowed_path_pattern: "(?:^|/)(?:dialogs?|bottom_sheets?|overlays?|fullscreen_modals?)(?:/|$)|(?:^|/)[^/]*_(?:dialog|bottom_sheet|overlay|fullscreen_modal)\\.dart$"

  - id: ui_font_size_media_query_scaling
