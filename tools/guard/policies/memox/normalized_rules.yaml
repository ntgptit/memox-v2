        - "\\bEdgeInsets\\.symmetric\\([^)]*(?:horizontal|vertical)\\s*:\\s*(?P<value>\\d+(?:\\.\\d+)?)"
        - "\\bEdgeInsets\\.only\\([^)]*(?:left|top|right|bottom)\\s*:\\s*(?P<value>\\d+(?:\\.\\d+)?)"
        - "\\bSizedBox\\([^)]*(?:height|width)\\s*:\\s*(?P<value>\\d+(?:\\.\\d+)?)"

