  - id: ui_media_query_screen_percentage
    type: ast_check
    name: "UI MediaQuery Screen Percentage"
    description: "Regular widget files must not size content layouts by multiplying `MediaQuery.of(context).size.width` or `.height`. Keep these patterns inside dedicated dialog, bottom-sheet, overlay, or fullscreen-modal widgets only."
