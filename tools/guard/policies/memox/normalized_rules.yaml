family: normalized

rules:
  - id: legacy_state_notifier
    type: forbidden_pattern
    name: "Legacy StateNotifier"
    description: "Do not use `StateNotifier` in non-legacy app source; new state should use `Notifier` or `AsyncNotifier`."
    message_code: legacy_state_notifier
    severity: error
    impact: architecture
    scope: non_legacy_app_source
    suggestion: "Use Riverpod 3 annotation syntax with generated notifiers instead."
    params:
      patterns:
        - "\\bStateNotifier\\b"

  - id: change_notifier_provider_usage
    type: forbidden_pattern
    name: "ChangeNotifierProvider Usage"
    description: "Do not import or use `ChangeNotifierProvider`; it is a migration bridge and is not allowed in this codebase."
    message_code: change_notifier_provider_usage
    severity: error
    impact: architecture
    scope: all
    fix_hint_code: use_riverpod_annotation_provider
    params:
      patterns:
        - "\\bChangeNotifierProvider\\b"

  - id: state_notifier_provider_creation
    type: forbidden_pattern
    name: "StateNotifierProvider Creation"
    description: "Do not create `StateNotifierProvider` in non-legacy app source; new state should use generated `Notifier` or `AsyncNotifier`."
    message_code: state_notifier_provider_creation
    severity: error
    impact: architecture
    scope: non_legacy_app_source
    fix_hint_code: use_riverpod_annotation_provider
    params:
      patterns:
        - "\\bStateNotifierProvider(?:\\.[A-Za-z]+)?\\s*(?:<[^>]+>)?\\s*\\("

  - id: manual_provider_constructor_usage
    type: forbidden_pattern
    name: "Manual Provider Constructor Usage"
    description: "App source should use Riverpod code generation instead of manual provider constructors."
    message_code: manual_provider_constructor_usage
    severity: error
    impact: architecture
    scope: all
    fix_hint_code: use_riverpod_annotation_provider
    params:
      patterns:
        - "\\bProvider(?:\\.[A-Za-z]+)?\\s*(?:<[^>]+>)?\\s*\\("
        - "\\bStateProvider(?:\\.[A-Za-z]+)?\\s*(?:<[^>]+>)?\\s*\\("
        - "\\bFutureProvider\\b"
        - "\\bStreamProvider\\b"
        - "\\bNotifierProvider\\b"
        - "\\bAsyncNotifierProvider\\b"
        - "\\bStreamNotifierProvider\\b"

  - id: raw_debug_logging
    type: forbidden_pattern
    name: "Raw Debug Logging"
    description: "App source must not use raw debug logging APIs directly."
    message_code: raw_debug_logging
    severity: error
    impact: architecture
    scope: app_source_except_logger
    fix_hint_code: use_app_logger
    params:
      patterns:
        - "\\bprint\\s*\\("
        - "\\bdebugPrint\\s*\\("
        - "\\bdeveloper\\.log\\s*\\("

  - id: raw_monitoring_call
    type: forbidden_pattern
    name: "Raw Monitoring Call"
    description: "App source must not call Sentry APIs directly; monitoring should flow through the repo's centralized logging or monitoring utility."
    message_code: raw_monitoring_call
    severity: error
    impact: architecture
    scope: app_source_except_logger
    fix_hint_code: use_app_logger
    params:
      patterns:
        - "\\bSentryFlutter\\.init\\s*\\("
        - "\\bSentry\\.captureException\\s*\\("
        - "\\bSentry\\.captureMessage\\s*\\("
        - "\\bSentry\\.configureScope\\s*\\("

  - id: sensitive_log_payload
    type: forbidden_pattern
    name: "Sensitive Log Payload"
    description: "Logging calls must not interpolate sensitive values such as tokens, passwords, secrets, or session identifiers."
    message_code: sensitive_log_payload
    severity: error
    impact: architecture
    scope: app_source_except_logger
    fix_hint_code: redact_sensitive_logs
    params:
      patterns:
        - "(?:AppLogger\\.(?:debug|info|warning|error|fatal)|debugPrint|print|developer\\.log)\\s*\\([^\\n]*(?:token|password|secret|cookie|session|credential|api[ _-]?key)[^\\n:=]{0,32}[:=]"
        - "(?:AppLogger\\.(?:debug|info|warning|error|fatal)|debugPrint|print|developer\\.log)\\s*\\([^\\n]*[Bb]earer\\s+[A-Za-z0-9\\-._~+/=]+"

  - id: feature_bottom_sheet_entrypoint
    type: forbidden_pattern
    name: "Feature Bottom Sheet Entrypoint"
    description: "Avoid raw `showModalBottomSheet(...)` in feature presentation code; route through a shared helper."
    message_code: feature_bottom_sheet_entrypoint
    severity: error
    impact: architecture
    scope: features
    params:
      patterns:
        - "showModalBottomSheet\\s*\\("

  - id: app_bar_usage
    type: forbidden_pattern
    name: "App Bar Usage"
    description: "Avoid raw Material app bars in feature code; prefer shared toolbar primitives."
    message_code: app_bar_usage
    severity: error
    impact: design_system
    scope: features
    params:
      patterns:
        - "\\bAppBar\\s*\\("

  - id: floating_action_button_usage
    type: forbidden_pattern
    name: "Floating Action Button Usage"
    description: "Avoid raw Material floating action buttons in feature code; prefer shared FAB primitives."
    message_code: floating_action_button_usage
    severity: error
    impact: design_system
    scope: features
    params:
      patterns:
        - "\\bFloatingActionButton(?:\\.[A-Za-z_][A-Za-z0-9_]*)?\\s*\\("

  - id: button_usage
    type: forbidden_pattern
    name: "Button Usage"
    description: "Avoid raw Material button widgets in feature code; prefer shared button primitives."
    message_code: button_usage
    severity: error
    impact: design_system
    scope: features
    params:
      patterns:
        - "\\bElevatedButton(?:\\.[A-Za-z_][A-Za-z0-9_]*)?\\s*\\("
        - "\\bFilledButton(?:\\.[A-Za-z_][A-Za-z0-9_]*)?\\s*\\("
        - "\\bOutlinedButton(?:\\.[A-Za-z_][A-Za-z0-9_]*)?\\s*\\("
        - "\\bTextButton(?:\\.[A-Za-z_][A-Za-z0-9_]*)?\\s*\\("

  - id: card_usage
    type: forbidden_pattern
    name: "Card Usage"
    description: "Avoid raw Material card widgets in feature code; prefer shared card primitives."
    message_code: card_usage
    severity: error
    impact: design_system
    scope: features
    params:
      patterns:
        - "\\bCard(?:\\.[A-Za-z_][A-Za-z0-9_]*)?\\s*\\("

  - id: dialog_usage
    type: forbidden_pattern
    name: "Dialog Usage"
    description: "Avoid raw Material dialog widgets in feature code; prefer shared dialog primitives."
    message_code: dialog_usage
    severity: error
    impact: design_system
    scope: features
    params:
      patterns:
        - "\\bAlertDialog(?:\\.[A-Za-z_][A-Za-z0-9_]*)?\\s*\\("
        - "\\bSimpleDialog(?:\\.[A-Za-z_][A-Za-z0-9_]*)?\\s*\\("
        - "\\bAboutDialog(?:\\.[A-Za-z_][A-Za-z0-9_]*)?\\s*\\("
        - "\\bDialog(?:\\.[A-Za-z_][A-Za-z0-9_]*)?\\s*\\("

  - id: input_usage
    type: forbidden_pattern
    name: "Input Usage"
    description: "Avoid raw Material text input widgets in feature code; prefer shared text-field primitives."
    message_code: input_usage
    severity: error
    impact: design_system
    scope: features
    params:
      patterns:
        - "\\bTextField(?:\\.[A-Za-z_][A-Za-z0-9_]*)?\\s*\\("
        - "\\bTextFormField(?:\\.[A-Za-z_][A-Za-z0-9_]*)?\\s*\\("
        - "\\bSearchBar(?:\\.[A-Za-z_][A-Za-z0-9_]*)?\\s*\\("
        - "\\bSearchAnchor(?:\\.[A-Za-z_][A-Za-z0-9_]*)?\\s*\\("

  - id: chip_usage
    type: forbidden_pattern
    name: "Chip Usage"
    description: "Avoid raw Material chip widgets in feature code; prefer shared chip primitives."
    message_code: chip_usage
    severity: error
    impact: design_system
    scope: features
    params:
      patterns:
        - "\\bChip(?:\\.[A-Za-z_][A-Za-z0-9_]*)?\\s*\\("
        - "\\bChoiceChip(?:\\.[A-Za-z_][A-Za-z0-9_]*)?\\s*\\("
        - "\\bFilterChip(?:\\.[A-Za-z_][A-Za-z0-9_]*)?\\s*\\("
        - "\\bActionChip(?:\\.[A-Za-z_][A-Za-z0-9_]*)?\\s*\\("
        - "\\bInputChip(?:\\.[A-Za-z_][A-Za-z0-9_]*)?\\s*\\("

  - id: icon_button_usage
    type: forbidden_pattern
    name: "Icon Button Usage"
    description: "Avoid raw Material icon buttons in feature code; prefer shared icon-button primitives."
    message_code: icon_button_usage
    severity: error
    impact: design_system
    scope: features
    params:
      patterns:
        - "\\bIconButton(?:\\.[A-Za-z_][A-Za-z0-9_]*)?\\s*\\("

  - id: select_usage
    type: forbidden_pattern
    name: "Select Usage"
    description: "Avoid raw Material dropdown widgets in feature code; prefer shared select-field primitives."
    message_code: select_usage
    severity: error
    impact: design_system
    scope: features
    params:
      patterns:
        - "\\bDropdownButton(?:\\.[A-Za-z_][A-Za-z0-9_]*)?\\s*\\("
        - "\\bDropdownButtonFormField(?:\\.[A-Za-z_][A-Za-z0-9_]*)?\\s*\\("
        - "\\bDropdownMenu(?:\\.[A-Za-z_][A-Za-z0-9_]*)?\\s*\\("

  - id: progress_usage
    type: forbidden_pattern
    name: "Progress Usage"
    description: "Avoid raw Material progress indicators in feature code; prefer shared loading/progress primitives."
    message_code: progress_usage
    severity: error
    impact: design_system
    scope: features
    params:
      patterns:
        - "\\bCircularProgressIndicator(?:\\.[A-Za-z_][A-Za-z0-9_]*)?\\s*\\("
        - "\\bLinearProgressIndicator(?:\\.[A-Za-z_][A-Za-z0-9_]*)?\\s*\\("

  - id: divider_usage
    type: forbidden_pattern
    name: "Divider Usage"
    description: "Avoid raw Material dividers in feature code; prefer shared divider primitives."
    message_code: divider_usage
    severity: error
    impact: design_system
    scope: features
    params:
      patterns:
        - "\\bDivider(?:\\.[A-Za-z_][A-Za-z0-9_]*)?\\s*\\("
        - "\\bVerticalDivider(?:\\.[A-Za-z_][A-Za-z0-9_]*)?\\s*\\("

  - id: switch_usage
    type: forbidden_pattern
    name: "Switch Usage"
    description: "Avoid raw Material switches in feature code; prefer shared toggle primitives."
    message_code: switch_usage
    severity: error
    impact: design_system
    scope: features
    params:
      patterns:
        - "\\bSwitch(?:\\.[A-Za-z_][A-Za-z0-9_]*)?\\s*\\("
        - "\\bSwitchListTile(?:\\.[A-Za-z_][A-Za-z0-9_]*)?\\s*\\("

  - id: feature_raw_flutter_widget_usage
    type: forbidden_pattern
    name: "Feature Raw Flutter Widget Usage"
    description: "Avoid raw Flutter Material widgets in feature code, including basic surfaces such as `Scaffold`, `AppBar`, buttons, cards, text fields, chips, icon buttons, selects, progress indicators, dividers, and switches, plus higher-level controls such as menus, tiles, tabs, navigation widgets, sliders, and pickers."
    message_code: feature_raw_flutter_widget_usage
    severity: error
    impact: design_system
    scope: features
    fix_hint_code: use_shared_widget_in_features
    params:
      patterns:
        - "\\bScaffold\\s*\\("
        - "\\bAppBar\\s*\\("
        - "\\bFloatingActionButton(?:\\.[A-Za-z_][A-Za-z0-9_]*)?\\s*\\("
        - "\\bElevatedButton(?:\\.[A-Za-z_][A-Za-z0-9_]*)?\\s*\\("
        - "\\bFilledButton(?:\\.[A-Za-z_][A-Za-z0-9_]*)?\\s*\\("
        - "\\bOutlinedButton(?:\\.[A-Za-z_][A-Za-z0-9_]*)?\\s*\\("
        - "\\bTextButton(?:\\.[A-Za-z_][A-Za-z0-9_]*)?\\s*\\("
        - "\\bCard(?:\\.[A-Za-z_][A-Za-z0-9_]*)?\\s*\\("
        - "\\bAlertDialog(?:\\.[A-Za-z_][A-Za-z0-9_]*)?\\s*\\("
        - "\\bSimpleDialog(?:\\.[A-Za-z_][A-Za-z0-9_]*)?\\s*\\("
        - "\\bAboutDialog(?:\\.[A-Za-z_][A-Za-z0-9_]*)?\\s*\\("
        - "\\bDialog(?:\\.[A-Za-z_][A-Za-z0-9_]*)?\\s*\\("
        - "\\bTextField(?:\\.[A-Za-z_][A-Za-z0-9_]*)?\\s*\\("
        - "\\bTextFormField(?:\\.[A-Za-z_][A-Za-z0-9_]*)?\\s*\\("
        - "\\bSearchBar(?:\\.[A-Za-z_][A-Za-z0-9_]*)?\\s*\\("
        - "\\bSearchAnchor(?:\\.[A-Za-z_][A-Za-z0-9_]*)?\\s*\\("
        - "\\bChip(?:\\.[A-Za-z_][A-Za-z0-9_]*)?\\s*\\("
        - "\\bChoiceChip(?:\\.[A-Za-z_][A-Za-z0-9_]*)?\\s*\\("
        - "\\bFilterChip(?:\\.[A-Za-z_][A-Za-z0-9_]*)?\\s*\\("
        - "\\bActionChip(?:\\.[A-Za-z_][A-Za-z0-9_]*)?\\s*\\("
        - "\\bInputChip(?:\\.[A-Za-z_][A-Za-z0-9_]*)?\\s*\\("
        - "\\bIconButton(?:\\.[A-Za-z_][A-Za-z0-9_]*)?\\s*\\("
        - "\\bDropdownButton(?:\\.[A-Za-z_][A-Za-z0-9_]*)?\\s*\\("
        - "\\bDropdownButtonFormField(?:\\.[A-Za-z_][A-Za-z0-9_]*)?\\s*\\("
        - "\\bDropdownMenu(?:\\.[A-Za-z_][A-Za-z0-9_]*)?\\s*\\("
        - "\\bCircularProgressIndicator(?:\\.[A-Za-z_][A-Za-z0-9_]*)?\\s*\\("
        - "\\bLinearProgressIndicator(?:\\.[A-Za-z_][A-Za-z0-9_]*)?\\s*\\("
        - "\\bDivider(?:\\.[A-Za-z_][A-Za-z0-9_]*)?\\s*\\("
        - "\\bVerticalDivider(?:\\.[A-Za-z_][A-Za-z0-9_]*)?\\s*\\("
        - "\\bSwitch(?:\\.[A-Za-z_][A-Za-z0-9_]*)?\\s*\\("
        - "\\bSwitchListTile(?:\\.[A-Za-z_][A-Za-z0-9_]*)?\\s*\\("
        - "\\bCheckbox\\s*\\("
        - "\\bCheckboxListTile\\s*\\("
        - "\\bRadio\\s*\\("
        - "\\bRadioListTile\\s*\\("
        - "\\bSlider\\s*\\("
        - "\\bRangeSlider\\s*\\("
        - "\\bSegmentedButton(?:<[^>]+>)?\\s*\\("
        - "\\bPopupMenuButton(?:<[^>]+>)?\\s*\\("
        - "\\bMenuAnchor\\s*\\("
        - "\\bMenuBar\\s*\\("
        - "\\bSubmenuButton\\s*\\("
        - "\\bListTile\\s*\\("
        - "\\bExpansionTile\\s*\\("
        - "\\bNavigationBar\\s*\\("
        - "\\bBottomNavigationBar\\s*\\("
        - "\\bNavigationRail\\s*\\("
        - "\\bNavigationDrawer\\s*\\("
        - "\\bTabBar\\s*\\("
        - "\\bTabBarView\\s*\\("
        - "\\bTabPageSelector\\s*\\("
        - "\\bStepper\\s*\\("
        - "\\bshowDatePicker\\s*\\("
        - "\\bshowDateRangePicker\\s*\\("
        - "\\bshowTimePicker\\s*\\("
        - "\\bDatePickerDialog\\s*\\("
        - "\\bTimePickerDialog\\s*\\("
      skip_comments: true

  - id: snackbar_usage
    type: forbidden_pattern
    name: "Snack Bar Usage"
    description: "Avoid raw Material snack bars in feature code; prefer shared snackbar helpers."
    message_code: snackbar_usage
    severity: error
    impact: design_system
    scope: features
    params:
      patterns:
        - "\\bSnackBar\\s*\\("

  - id: popup_menu_button_child_forbidden
    type: forbidden_pattern
    name: "PopupMenuButton Child Trigger Forbidden"
    description: "Do not use `PopupMenuButton(child: ...)` on UI surfaces because its internal overlay may not match the child's rounded shape."
    message_code: popup_menu_button_child_forbidden
    severity: error
    impact: design_system
    scope: ui
    fix_hint_code: use_menu_anchor_shaped_trigger
    params:
      patterns:
        - "(?s)\\bPopupMenuButton(?:<[^>]+>)?\\s*\\(.*?\\bchild\\s*:"
      skip_comments: true

  - id: snackbar_messenger_usage
    type: forbidden_pattern
    name: "Snack Bar Messenger Usage"
    description: "Feature UI should not call `ScaffoldMessenger.of(...)` directly; route feedback through shared snackbar helpers."
    message_code: snackbar_messenger_usage
    severity: error
    impact: architecture
    scope: feature_ui
    params:
      patterns:
        - "\\bScaffoldMessenger\\.of\\s*\\("

  - id: dialog_entrypoint_usage
    type: forbidden_pattern
    name: "Dialog Entrypoint Usage"
    description: "Feature UI should not call `showDialog(...)` directly; route dialog flows through shared dialog helpers."
    message_code: dialog_entrypoint_usage
    severity: error
    impact: architecture
    scope: feature_ui
    params:
      patterns:
        - "\\bshowDialog\\s*\\("

  - id: l10n_source
    type: forbidden_token
    name: "L10n Source"
    description: "Presentation code should not pull user-facing strings from `AppStrings`."
    message_code: l10n_source
    severity: error
    impact: i18n
    scope: ui
    params:
      forbidden:
        - "AppStrings"
      skip_comments: true

  - id: ui_error_stringify
    type: forbidden_pattern
    name: "UI Error Stringify"
    description: "UI and app layout surfaces should not stringify raw errors directly."
    message_code: ui_error_stringify
    severity: error
    impact: architecture
    scope: ui_surfaces
    fix_hint_code: use_failure_message_resolver
    params:
      patterns:
        - "error\\.toString\\(\\)"

  - id: ui_low_level_exception_surface
    type: forbidden_pattern
    name: "UI Low-level Exception Surface"
    description: "UI and app layout surfaces must not depend on low-level network or database exception types."
    message_code: ui_low_level_exception_surface
    severity: error
    impact: architecture
    scope: ui_surfaces
    fix_hint_code: use_failure_message_resolver
    params:
      patterns:
        - "\\bSqliteException\\b"
        - "\\bDriftWrappedException\\b"
        - "\\bDioException\\b"
        - "\\bSocketException\\b"

  - id: provider_low_level_exception_surface
    type: forbidden_pattern
    name: "Provider Low-level Exception Surface"
    description: "Provider-owned files must not depend on low-level database or network exception types."
    message_code: provider_low_level_exception_surface
    severity: error
    impact: architecture
    scope: provider_files
    fix_hint_code: use_provider_failure_boundary
    params:
      patterns:
        - "\\bSqliteException\\b"
        - "\\bDriftWrappedException\\b"
        - "\\bDioException\\b"
        - "\\bSocketException\\b"

  - id: provider_ui_ref_types
    type: forbidden_pattern
    name: "Provider UI Ref Types"
    description: "Provider-owned files must not depend on UI-bound types such as BuildContext or WidgetRef."
    message_code: provider_ui_ref_types
    severity: error
    impact: architecture
    scope: provider_files
    fix_hint_code: keep_ui_types_out_of_providers
    params:
      patterns:
        - "\\bBuildContext\\b"
        - "\\bWidgetRef\\b"

  - id: provider_async_error_wrapper
    type: forbidden_pattern
    name: "Provider AsyncError Wrapper"
    description: "Provider-owned files must not wrap errors with raw `AsyncError`; map them to `AppFailure`."
    message_code: provider_async_error_wrapper
    severity: error
    impact: architecture
    scope: provider_files
    fix_hint_code: use_provider_failure_boundary
    params:
      patterns:
        - "throw\\s+AsyncError\\s*\\("

  - id: provider_raw_async_error_state
    type: forbidden_pattern
    name: "Provider Raw AsyncValue Error State"
    description: "Provider-owned files must not assign raw caught errors into AsyncValue.error; map them to AppFailure first."
    message_code: provider_raw_async_error_state
    severity: error
    impact: architecture
    scope: provider_files
    fix_hint_code: map_provider_error_before_asyncvalue
    params:
      patterns:
        - "AsyncValue\\.error\\s*\\(\\s*error\\b"
        - "AsyncValue\\.error\\s*\\(\\s*e\\b"
        - "AsyncValue\\.error\\s*\\(\\s*exception\\b"

  - id: provider_raw_string_error_state
    type: forbidden_pattern
    name: "Provider Raw String Error State"
    description: "Provider-owned files must not publish raw string error states."
    message_code: provider_raw_string_error_state
    severity: error
    impact: architecture
    scope: provider_files
    fix_hint_code: use_provider_failure_boundary
    params:
      patterns:
        - "AsyncValue\\.error\\s*\\(\\s*'[^']+'"
        - "AsyncValue\\.error\\s*\\(\\s*\"[^\"]+\""

  - id: core_service_map_state_return
    type: forbidden_pattern
    name: "Core Service Map State Return"
    description: "Core service/provider state surfaces must not return `Map<String, dynamic>` or `Map<String, bool>` from `build()` or state-style getter methods. Introduce immutable typed state objects instead."
    message_code: core_service_map_state_return
    severity: error
    impact: architecture
    scope: service_files
    fix_hint_code: use_immutable_core_service_state
    params:
      patterns:
        - "\\bFuture(?:Or)?<Map<String,\\s*(?:dynamic|bool)>>\\s+build\\s*\\("
        - "\\bMap<String,\\s*(?:dynamic|bool)>\\s+build\\s*\\("
        - "\\bFuture<Map<String,\\s*(?:dynamic|bool)>>\\s+get(?:DeviceInfo|State|Status|Settings|Permissions)\\s*\\("

  - id: core_service_map_state_key_access
    type: forbidden_pattern
    name: "Core Service Map State Key Access"
    description: "Core service/provider state assembly must not rely on string-keyed bags such as `settings['flag']` or `status['timestamp']`; model typed fields explicitly."
    message_code: core_service_map_state_key_access
    severity: error
    impact: architecture
    scope: service_files
    fix_hint_code: replace_map_state_bag_with_typed_fields
    params:
      patterns:
        - "\\b(?:state|settings|status|info)\\s*\\[\\s*['\"][A-Za-z0-9_]+['\"]\\s*\\]"

  - id: provider_no_unnamed_catch
    type: forbidden_pattern
    name: "Provider No Unnamed Catch"
    description: "Provider-owned files must not use unnamed catch bindings such as `catch (_)`, because they hide the real failure source."
    message_code: provider_no_unnamed_catch
    severity: error
    impact: architecture
    scope: provider_files
    fix_hint_code: avoid_unnamed_provider_catch
    params:
      patterns:
        - "\\bcatch\\s*\\(_\\)"

  - id: provider_invalidate_self
    type: forbidden_pattern
    name: "Provider Invalidate Self"
    description: "Provider-owned files must not use `invalidateSelf()`; explicit retry or invalidation boundaries are required."
    message_code: provider_invalidate_self
    severity: error
    impact: architecture
    scope: provider_files
    fix_hint_code: avoid_provider_retry_loops
    params:
      patterns:
        - "\\binvalidateSelf\\s*\\("

  - id: provider_ui_side_effects
    type: forbidden_pattern
    name: "Provider UI Side Effects"
    description: "Provider-owned files must not perform UI side effects directly."
    message_code: provider_ui_side_effects
    severity: error
    impact: architecture
    scope: provider_files
    fix_hint_code: move_provider_side_effect_to_listener
    params:
      patterns:
        - "\\bSnackBar\\s*\\("
        - "\\bshowDialog\\s*\\("
        - "\\bshowModalBottomSheet\\s*\\("
        - "\\bScaffoldMessenger\\."
        - "\\bNavigator\\."
        - "\\bcontext\\.go\\s*\\("
        - "\\bcontext\\.push\\s*\\("

  - id: provider_resource_lifecycle
    type: ast_check
    name: "Provider Resource Lifecycle"
    description: "Provider-owned files that create controllers, timers, subscriptions, sockets, or clients must register cleanup with `ref.onDispose(...)`."
    message_code: provider_resource_lifecycle
    severity: error
    impact: architecture
    scope: provider_files
    fix_hint_code: cleanup_provider_resource_with_on_dispose
    params:
      check_id: provider_resource_cleanup
      annotation_pattern: "^\\s*@(?:riverpod|Riverpod)\\b"
      dispose_registration_pattern: "\\bref\\.onDispose\\s*\\("
      resource_specs:
        - kind: StreamController
          cleanup_methods: [close]
          patterns:
