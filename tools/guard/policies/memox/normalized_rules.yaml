      typography_property_pattern: "\\b(?P<property>fontSize|fontWeight|height|letterSpacing|fontStyle)\\s*:"
      allowed_context_pattern: "guard:typography-copywith-reviewed"
      context_radius: 2

  - id: ui_display_font_size_literals
    type: ast_check
