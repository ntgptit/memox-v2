family: coding

rules:
  - id: provider_file_naming
    type: naming_convention
    name: "Provider File Naming"
    description: "Provider-owned files should use a clear suffix such as `*_provider.dart`, `*_providers.dart`, `*_notifier.dart`, or `*_viewmodel.dart`, and should avoid vague stems such as `common` or `main`."
    message_code: provider_file_naming
    severity: error
    impact: style
    scope: all
    targets:
      - "lib/app/di/*.dart"
      - "lib/presentation/features/*/providers/*.dart"
      - "lib/presentation/features/*/viewmodels/*.dart"
    params:
      level: file
      pattern: "^(?!(?:common|main|shared|base|misc|helper|util|temp)(?:_|$))(?:[a-z0-9]+(?:_[a-z0-9]+)*)_(?:provider|providers|notifier|notifiers|viewmodel)\\.dart$|^(?:app_)?providers\\.dart$"

  - id: guard_centralized_constants
    type: forbidden_pattern
    name: "Guard Centralized Constants"
    description: "Guard Python sources must not hardcode shared guard contract literals; move them into `tools/guard/engine/constants.py` and import the constant instead."
    message_code: guard_centralized_constants
    severity: error
    impact: architecture
    scope: guard_python_non_constants
    params:
      patterns:
        - "[\"']config\\.yaml[\"']"
        - "[\"']messages\\.yaml[\"']"
        - "[\"']suppressions\\.yaml[\"']"
        - "[\"']baseline\\.json[\"']"
        - "[\"']utf-8[\"']"
        - "[\"']terminal[\"']"
        - "[\"']json[\"']"
        - "[\"']markdown[\"']"
        - "[\"']PASS[\"']"
        - "[\"']FAIL[\"']"
        - "[\"']enabled[\"']"
        - "[\"']disabled[\"']"
        - "[\"']rules[\"']"
        - "[\"']violations_preview[\"']"

  - id: async_refetch_blanks_screen
    type: forbidden_pattern
    name: "AsyncValue Refetch Must Preserve Previous Data"
    description: >
      Screen-level widgets must not blank the whole UI every time a watched
      provider refetches because of search, sort, or revision-driven query
      changes. Do not use `AsyncValue.when(loading: () => MxLoadingState...)`
      directly on these screen surfaces. Preserve previous data during refetch
      and reserve `MxLoadingState` for first-load only.
    message_code: async_refetch_blanks_screen
    severity: error
    impact: performance
    scope: screen_like_files
    params:
      patterns:
        - "loading:\\s*\\(\\)\\s*=>\\s*const\\s+MxLoadingState"
        - "loading:\\s*\\(\\)\\s*=>\\s*MxLoadingState\\("

  - id: feature_query_provider_keep_alive
    type: forbidden_pattern
    name: "Feature Query Provider Must Declare Lifecycle"
    description: >
      Feature read-model query providers that return `Future<...State>`,
      `Future<...ReadModel>`, `Future<...Query>`, or the stream equivalents
      must opt into a deliberate lifecycle with `@Riverpod(keepAlive: true)`
      or an explicit `ref.keepAlive()` strategy. Plain `@riverpod` autoDispose
      on these providers causes push/pop refetch flicker on screen mount.
    message_code: feature_query_provider_keep_alive
    severity: error
    impact: performance
    scope: viewmodel_files
    targets:
      - "lib/presentation/features/**/viewmodels/*_viewmodel.dart"
    params:
      patterns:
        - "@riverpod\\s*(?:\\r?\\n)+Future<\\w+(?:ReadModel|State|Query)>"
        - "@riverpod\\s*(?:\\r?\\n)+Stream<\\w+(?:ReadModel|State|Query)>"

  - id: shell_fab_no_route_state_coupling
    type: forbidden_pattern
    name: "Shell FAB Must Not Couple To Route Path"
    description: >
      App-shell floating action buttons must not toggle directly from
      `state.uri.path` checks. That coupling makes the shell rebuild and swap
      FAB presence across sub-routes, which shows up as navigation flicker.
      Keep the FAB inside the owning screen or animate visibility locally.
    message_code: shell_fab_no_route_state_coupling
    severity: error
    impact: architecture
    scope: all
    targets:
      - "lib/app/app_shell.dart"
    params:
      patterns:
        - "state\\.uri\\.path\\s*==\\s*RoutePaths\\."

  - id: retained_async_state_requires_skeleton
    type: forbidden_pattern
    name: "First-load Must Provide Layout Skeleton"
    description: >
      Push-from-list detail screens that use `MxRetainedAsyncState` must supply
      a `skeletonBuilder` for the first load. Falling back to `MxLoadingState`
      on these screens creates a high-contrast flash on the first route frame.
    message_code: retained_async_state_requires_skeleton
    severity: warning
    impact: performance
    scope: screen_like_files
    targets:
      - "lib/presentation/features/folders/screens/folder_detail_screen.dart"
      - "lib/presentation/features/decks/screens/deck_detail_screen.dart"
      - "lib/presentation/features/flashcards/screens/flashcard_list_screen.dart"
    params:
      patterns:
        - "(?s)MxRetainedAsyncState<[^>]+>\\((?:(?!skeletonBuilder).)*?\\)"
