family: project

rules:
  - id: folder_structure
    type: path_structure
    name: "Folder Structure"
    description: "The clean architecture roots for this Flutter app must exist."
    severity: critical
    impact: architecture
    scope: all
    params:
      required_dirs:
        - "lib/app/providers"
        - "lib/app/layouts"
        - "lib/core/di"
        - "lib/core/routes"
        - "lib/core/theme"
        - "lib/data/repositories"
        - "lib/domain/entities"
        - "lib/domain/repositories"
        - "lib/presentation/features"
        - "lib/presentation/shared"

  - id: required_architecture_files
    type: file_existence
    name: "Required Architecture Files"
    description: "The app-level routing, theme, and provider entry files must exist in their standardized locations."
    severity: critical
    impact: architecture
    scope: all
    params:
      required_files:
        - "lib/core/di/providers.dart"
        - "lib/core/logging/app_logger.dart"
        - "lib/core/logging/app_provider_observer.dart"
        - "lib/core/routes/router.dart"
        - "lib/core/theme/app_theme.dart"
        - "lib/app/providers/app_providers.dart"
        - "lib/app/providers/session_providers.dart"
        - "lib/app/providers/theme_providers.dart"

  - id: required_theme_token_files
    type: file_existence
    name: "Required Theme Token Files"
    description: "The design-token source of truth must exist in the standardized 9-token structure."
    severity: critical
    impact: design_system
    scope: all
    params:
      required_files:
        - "lib/core/theme/tokens/color_tokens.dart"
        - "lib/core/theme/tokens/typography_tokens.dart"
        - "lib/core/theme/tokens/spacing_tokens.dart"
        - "lib/core/theme/tokens/size_tokens.dart"
        - "lib/core/theme/tokens/radius_tokens.dart"
        - "lib/core/theme/tokens/elevation_tokens.dart"
        - "lib/core/theme/tokens/duration_tokens.dart"
        - "lib/core/theme/tokens/easing_tokens.dart"
        - "lib/core/theme/tokens/opacity_tokens.dart"

  - id: required_l10n_files
    type: file_existence
    name: "Required L10n Files"
    description: "The project must declare Flutter l10n configuration and at least one ARB source file."
    severity: critical
    impact: i18n
    scope: all
    params:
      required_files:
        - "l10n.yaml"
        - "lib/l10n/app_en.arb"
        - "lib/l10n/app_vi.arb"

  - id: required_database_tests
    type: file_existence
    name: "Required Database Tests"
    description: "The local database and migration contract must have a dedicated test before merge."
    severity: critical
    impact: architecture
    scope: all
    params:
      required_files:
        - "test/core/database/app_database_test.dart"

  - id: pubspec_enables_l10n_generation
    type: required_pattern
    name: "Pubspec Enables L10n"
    description: "`pubspec.yaml` must enable Flutter l10n code generation and include `flutter_localizations`."
    message_code: missing_l10n_pubspec
    severity: critical
    impact: i18n
    scope: project_root_files
    targets:
      - "pubspec.yaml"
    params:
      patterns:
        - "flutter_localizations:"
        - "generate:\\s*true"

  - id: pubspec_has_monitoring_sdk
    type: required_pattern
    name: "Pubspec Has Monitoring SDK"
    description: "`pubspec.yaml` must include `sentry_flutter` for production monitoring."
    message_code: missing_monitoring_dependency
    severity: critical
    impact: architecture
    scope: project_root_files
    targets:
      - "pubspec.yaml"
    params:
      patterns:
        - "sentry_flutter:"

  - id: main_app_uses_l10n
    type: required_pattern
    name: "Main App Uses L10n"
    description: "`lib/main.dart` must bootstrap `AppLocalizations` in the app shell."
    message_code: missing_l10n_bootstrap
    severity: critical
    impact: i18n
    scope: app_bootstrap
    params:
      patterns:
        - "package:memox/l10n/app_localizations\\.dart"
        - "AppLocalizations\\.localizationsDelegates"
        - "AppLocalizations\\.supportedLocales"
        - "AppLocalizations\\.of\\(context\\)\\.appTitle"

  - id: main_bootstraps_app_logger
    type: required_pattern
    name: "Main Bootstraps AppLogger"
    description: "`lib/main.dart` must bootstrap logging and monitoring through `AppLogger`."
    message_code: missing_logging_bootstrap
    severity: critical
    impact: architecture
    scope: app_bootstrap
    params:
      patterns:
        - "package:memox/core/logging/app_logger\\.dart"
        - "await\\s+AppLogger\\.bootstrap\\("

  - id: main_bootstraps_provider_observer
    type: required_pattern
    name: "Main Bootstraps Provider Observer"
    description: "`lib/main.dart` must register the app Riverpod observer builder on the root `ProviderContainer`."
    message_code: missing_provider_observer_bootstrap
    severity: critical
    impact: architecture
    scope: app_bootstrap
    params:
      patterns:
        - "package:memox/core/logging/app_provider_observer\\.dart"
        - "ProviderContainer\\s*\\("
        - "observers\\s*:\\s*buildAppProviderObservers\\s*\\("

  - id: app_provider_observer_contract
    type: required_pattern
    name: "App Provider Observer Contract"
    description: "`app_provider_observer.dart` must gate provider observers by `APP_ENV`, include development and staging, and define a concrete `ProviderObserver`."
    message_code: missing_provider_observer_contract
    severity: critical
    impact: architecture
    scope: all
    targets:
      - "lib/core/logging/app_provider_observer.dart"
    params:
      patterns:
        - "String\\.fromEnvironment\\(\\s*'APP_ENV'"
        - "'development'"
        - "'staging'"
        - "buildAppProviderObservers\\s*\\("
        - "class\\s+AppProviderObserver\\s+extends\\s+ProviderObserver"

  - id: app_logger_global_handlers
    type: required_pattern
    name: "App Logger Global Handlers"
    description: "`lib/core/logging/app_logger.dart` must initialize monitoring and install global error handlers."
    message_code: missing_app_logger_contract
    severity: critical
    impact: architecture
    scope: all
    targets:
      - "lib/core/logging/app_logger.dart"
    params:
      patterns:
        - "FlutterError\\.onError\\s*="
        - "PlatformDispatcher\\.instance\\.onError\\s*="
        - "SentryFlutter\\.init\\("
        - "sendDefaultPii\\s*=\\s*false"
